[tool.ruff]
line-length = 110
target-version = "py312"
extend-exclude = ["UIDAI Project.ipynb", "UIDAI Project.ipynb.bak"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # function calls in default args (pandas patterns)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]    # assert False allowed in tests
"tools/*" = ["E402"]    # module-level imports after code OK in scripts

[tool.pytest.ini_options]
addopts = "-ra --strict-markers"
testpaths = ["tests"]
